<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fun Page</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevents scrollbars from particles */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none; /* User can click through particles */
            transition: transform 2s ease-out, opacity 2s ease-out;
        }

        #magicBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #5f27cd;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Interactive Fun Page!</h1>
    <button id="magicBtn">Click for Magic of a century!!</button>

    <script>
        const btn = document.getElementById('magicBtn');
        // Added the missing # to the last color
        const colorList = ['#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1', '#5f27cd'];

        btn.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 20 + 5;
            // Changed variable name to avoid "shadowing" the colorList array
            const randomColor = colorList[Math.floor(Math.random() * colorList.length)];

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = randomColor;

            // Start position
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;

            document.body.appendChild(particle);

            // Animate them moving outward
            requestAnimationFrame(() => {
                const offsetX = (Math.random() - 0.5) * 200;
                const offsetY = (Math.random() - 0.5) * 200;
                particle.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                particle.style.opacity = '0';
            });

            // Remove particles after animation
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }
    </script>
</body>
</html>
