<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Heart Symphony</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --staff-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Musical Staff Background */
            background: 
                linear-gradient(var(--bg-color), #302b63, #24243e),
                linear-gradient(var(--staff-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Moving glow effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(95, 39, 205, 0.2) 0%, transparent 70%);
            animation: moveGlow 10s infinite linear;
            z-index: -1;
        }

        @keyframes moveGlow {
            from { transform: translate(-25%, -25%); }
            to { transform: translate(0%, 0%); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.5s ease-out;
        }

        .heart {
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        .note {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #magicBtn {
            padding: 18px 40px;
            font-size: 1.3rem;
            cursor: pointer;
            background: linear-gradient(45deg, #ff4757, #5f27cd);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(95, 39, 205, 0.6);
            transition: all 0.3s;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #magicBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 71, 87, 0.8);
        }
    </style>
</head>
<body>

    <h1 style="text-shadow: 0 0 10px rgba(255,255,255,0.5);">Melody of Hearts</h1>
    <button id="magicBtn">Play the Magic</button>

    <script>
        const btn = document.getElementById('magicBtn');
        const colors = ['#ff6b6b', '#ff9ff3', '#feca57', '#48dbfb', '#1dd1a1'];
        const notes = ['♪', '♫', '♬', '♩', '∮'];

        btn.addEventListener('click', (e) => {
            const numParticles = 40;
            
            for (let i = 0; i < numParticles; i++) {
                const t = (i / numParticles) * 2 * Math.PI;
                // Alternate between a heart and a musical note
                if (i % 2 === 0) {
                    createParticle(e.clientX, e.clientY, t, 'heart');
                } else {
                    createParticle(e.clientX, e.clientY, t, 'note');
                }
            }
        });

        function createParticle(x, y, t, type) {
            const el = document.createElement('div');
            el.classList.add('particle', type);

            const size = Math.random() * 20 + 15;
            const color = colors[Math.floor(Math.random() * colors.length)];

            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            el.style.left = `${x - size/2}px`;
            el.style.top = `${y - size/2}px`;

            if (type === 'heart') {
                el.style.backgroundColor = color;
            } else {
                el.innerText = notes[Math.floor(Math.random() * notes.length)];
                el.style.color = color;
            }

            document.body.appendChild(el);

            // Heart Math
            const scale = 14; 
            const destX = 16 * Math.pow(Math.sin(t), 3) * scale;
            const destY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;

            requestAnimationFrame(() => {
                el.style.transform = `translate(${destX}px, ${destY}px) rotate(${t * 60}deg)`;
                el.style.opacity = '0';
            });

            setTimeout(() => el.remove(), 1500);
        }
    </script>
</body>
</html>
