<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Shape Explosion</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a; /* Darker background makes colors pop */
            font-family: sans-serif;
            color: white;
        }

        .particle {
            position: absolute;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            pointer-events: none;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.5s ease-out;
        }

        #magicBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s;
        }

        #magicBtn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Heart Math!</h1>
    <button id="magicBtn">Create a Heart of Hearts!</button>

    <script>
        const btn = document.getElementById('magicBtn');
        const colorList = ['#ff6b6b', '#ff9ff3', '#feca57', '#ff4757', '#ffafbd'];

        btn.addEventListener('click', (e) => {
            const numParticles = 40; // More particles make the shape clearer
            for (let i = 0; i < numParticles; i++) {
                // 't' goes from 0 to 2*PI to complete the circle/heart
                const t = (i / numParticles) * 2 * Math.PI;
                createHeartParticle(e.clientX, e.clientY, t);
            }
        });

        function createHeartParticle(x, y, t) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 15 + 10;
            const randomColor = colorList[Math.floor(Math.random() * colorList.length)];

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = randomColor;
            particle.style.left = `${x - size/2}px`;
            particle.style.top = `${y - size/2}px`;

            document.body.appendChild(particle);

            // Heart Curve Equations (scaled by 10 for visibility)
            const scale = 12; 
            const destX = 16 * Math.pow(Math.sin(t), 3) * scale;
            const destY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;

            requestAnimationFrame(() => {
                // Apply the calculated heart coordinates
                particle.style.transform = `translate(${destX}px, ${destY}px) rotate(${t * 50}deg)`;
                particle.style.opacity = '0';
            });

            setTimeout(() => {
                particle.remove();
            }, 1500);
        }
    </script>
</body>
</html>
