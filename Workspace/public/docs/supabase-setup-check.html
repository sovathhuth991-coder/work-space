<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Workspace Hub — Supabase setup check</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; background: #fafafa; }
  h1 { font-size: 1.4rem; }
  p.sub { color: #555; margin-top: -8px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; margin-top: 14px; }
  input { width: 100%; padding: 8px 10px; font-size: 0.95rem; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
  button { margin-top: 18px; padding: 10px 18px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 6px; background: #4f46e5; color: white; cursor: pointer; }
  button:disabled { background: #aaa; cursor: default; }
  #results { margin-top: 24px; }
  .row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; }
  .pass { background: #e8f7ee; }
  .fail { background: #fdecec; }
  .warn { background: #fff8e1; }
  .pending { background: #eee; color: #888; }
  .icon { font-weight: 700; width: 18px; flex-shrink: 0; }
  .pass .icon { color: #1a7f3c; }
  .fail .icon { color: #c62828; }
  .warn .icon { color: #b8860b; }
  .detail { color: #555; font-size: 0.82rem; margin-top: 2px; }
  code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }
  #summary { margin-top: 18px; padding: 12px; border-radius: 8px; font-weight: 600; display: none; }
</style>
</head>
<body>

<h1>Workspace Hub — Supabase setup check</h1>
<p class="sub">Fill in the two values from your Supabase project (Settings → API Keys), then run the checks. Nothing here is sent anywhere except directly to your own Supabase project — this page never talks to Anthropic or anyone else.</p>

<label for="url">Project URL</label>
<input id="url" placeholder="https://xxxxx.supabase.co" />

<label for="key">Publishable key (or legacy anon key)</label>
<input id="key" placeholder="sb_publishable_... or eyJhbGciOi..." />

<button id="run">Run checks</button>

<div id="results"></div>
<div id="summary"></div>

<script>
const EXPECTED_TABLES = [
  'tasks', 'habits', 'library_items', 'schedule_events',
  'journal_entries', 'reading_items', 'dashboard_layout'
];

function addRow(id, label) {
  const row = document.createElement('div');
  row.className = 'row pending';
  row.id = id;
  row.innerHTML = `<span class="icon">…</span><div><div>${label}</div><div class="detail"></div></div>`;
  document.getElementById('results').appendChild(row);
}

function setRow(id, state, detail) {
  const row = document.getElementById(id);
  row.className = 'row ' + state;
  row.querySelector('.icon').textContent = state === 'pass' ? '✓' : state === 'fail' ? '✕' : '!';
  row.querySelector('.detail').textContent = detail || '';
}

document.getElementById('run').addEventListener('click', async () => {
  let url = document.getElementById('url').value.trim();
  const key = document.getElementById('key').value.trim();
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('run').disabled = true;

  if (!url || !key) {
    alert('Fill in both fields first.');
    document.getElementById('run').disabled = false;
    return;
  }

  // Auto-correct the most common copy mistake: pasting the REST endpoint
  // (".../rest/v1/") instead of the bare project URL. supabase-js appends
  // its own "/rest/v1/..." on top of whatever's given, so a URL that
  // already ends in it produces a doubled, invalid path.
  const originalUrl = url;
  url = url.replace(/\/rest\/v1\/?$/i, '').replace(/\/+$/, '');
  const wasCorrected = url !== originalUrl;

  const urlOk = /^https:\/\/[a-z0-9]+\.supabase\.co$/i.test(url);
  const urlCheck = document.createElement('div');
  urlCheck.className = 'row ' + (urlOk ? 'pass' : 'warn');
  urlCheck.innerHTML = `<span class="icon">${urlOk ? '✓' : '!'}</span><div><div>Project URL format</div><div class="detail">${wasCorrected ? `Pasted value ended in <code>/rest/v1/</code> \u2014 auto-corrected to ` : 'Testing against: '}<code>${url}</code>${urlOk ? '' : ' \u2014 this doesn\'t look like a typical Project URL (expected just https://xxxxx.supabase.co, nothing more). Double-check what you pasted.'}</div></div>`;
  document.getElementById('results').appendChild(urlCheck);

  let client;
  let failCount = 0, warnCount = 0;
  if (!urlOk) warnCount++;

  // ---- Check 1: connection ----
  addRow('conn', 'Can connect to your Supabase project');
  try {
    client = window.supabase.createClient(url, key);
    const { error } = await client.from(EXPECTED_TABLES[0]).select('*').limit(1);
    if (error && /invalid path|failed to fetch|networkerror/i.test(error.message || '')) throw error;
    setRow('conn', 'pass', 'Project URL and key are valid and reachable.');
  } catch (e) {
    setRow('conn', 'fail', 'Could not reach the project properly: ' + (e.message || e) + '. Check the Project URL is exactly as shown on Settings \u2192 API Keys \u2014 just "https://xxxxx.supabase.co" with nothing appended, no trailing slash, and no extra pasted characters.');
    failCount++;
    finish();
    return;
  }

  // ---- Check 2: each expected table exists ----
  for (const table of EXPECTED_TABLES) {
    const id = 'table_' + table;
    addRow(id, `Table "${table}" exists`);
    const { error } = await client.from(table).select('*').limit(1);
    if (!error) {
      setRow(id, 'pass', 'Found and queryable.');
    } else if (error.code === '42P01' || /does not exist/i.test(error.message)) {
      setRow(id, 'fail', 'Table not found — re-check the CREATE TABLE statement for this one ran in the SQL Editor.');
      failCount++;
    } else if (/permission denied|row-level security/i.test(error.message)) {
      // Table exists, RLS blocked the anonymous read entirely (stricter than expected, but not wrong)
      setRow(id, 'pass', 'Found (anonymous reads are fully blocked, which is fine).');
    } else {
      setRow(id, 'warn', 'Unexpected response: ' + error.message);
      warnCount++;
    }
  }

  // ---- Check 3: RLS actually blocks anonymous writes ----
  for (const table of EXPECTED_TABLES) {
    const id = 'rls_' + table;
    addRow(id, `Row-level security blocks writes on "${table}" when signed out`);
    const fakeRow = table === 'dashboard_layout'
      ? { user_id: '00000000-0000-0000-0000-000000000000', data: {} }
      : { user_id: '00000000-0000-0000-0000-000000000000', data: {} };
    const { error, data } = await client.from(table).insert(fakeRow).select();
    const isRlsRejection = error && (
      error.code === '42501' ||
      /row-level security|permission denied/i.test(error.message || '')
    );
    if (isRlsRejection) {
      setRow(id, 'pass', 'Insert correctly rejected while signed out.');
    } else if (error) {
      setRow(id, 'warn', 'Insert failed, but not because of row-level security — this didn\'t actually test RLS. Error: ' + error.message + (error.code ? ' (code ' + error.code + ')' : ''));
      warnCount++;
    } else {
      setRow(id, 'fail', 'An anonymous insert SUCCEEDED — row-level security is not enabled or the policy is missing on this table. Anyone with your public key could currently write data as any user_id. Cleaning up the test row now.');
      failCount++;
      // best-effort cleanup of the row we just proved shouldn't have been writable
      if (data && data[0] && data[0].id) {
        await client.from(table).delete().eq('id', data[0].id);
      } else if (data && data[0]) {
        await client.from(table).delete().eq('user_id', fakeRow.user_id);
      }
    }
  }

  // ---- Check 4: auth providers respond ----
  addRow('auth_pw', 'Email/password sign-up endpoint responds');
  try {
    const testEmail = `setup-check-${Date.now()}@example.com`;
    const { error } = await client.auth.signUp({ email: testEmail, password: 'TemporaryCheck123!' });
    if (!error) {
      setRow('auth_pw', 'pass', `Working. A throwaway test account (${testEmail}) was created — safe to ignore, or delete it later from Authentication → Users in your dashboard.`);
    } else if (error.code === 'email_address_invalid' || /is invalid/i.test(error.message || '')) {
      setRow('auth_pw', 'pass', 'Working — Supabase rejected this specific placeholder test address (a known behavior for domains like example.com), which actually confirms the endpoint is live and validating correctly. This is not an SMTP issue and nothing needs configuring here. To test real delivery, try signing up with an email address you actually control.');
    } else if (/disabled|not enabled/i.test(error.message || '')) {
      setRow('auth_pw', 'fail', 'Email provider looks disabled. Check Authentication → Providers → Email is turned on.');
      failCount++;
    } else if (/smtp|rate limit|sending/i.test(error.message || '')) {
      setRow('auth_pw', 'warn', 'Endpoint works, but sending failed: ' + error.message + '. Supabase\'s default mailer has a low rate limit (a few emails/hour) meant for testing only \u2014 if you\'re hitting this repeatedly, wait a bit and retry rather than setting up custom SMTP, unless you\'re ready for real users.');
      warnCount++;
    } else {
      setRow('auth_pw', 'warn', error.message);
      warnCount++;
    }
  } catch (e) {
    setRow('auth_pw', 'warn', String(e));
    warnCount++;
  }

  addRow('auth_magic', 'Magic-link sign-in endpoint responds');
  try {
    const { error } = await client.auth.signInWithOtp({ email: `setup-check-${Date.now()}@example.com` });
    if (!error) {
      setRow('auth_magic', 'pass', 'Working (no email was actually sent to a real inbox since the address is fake).');
    } else if (error.code === 'email_address_invalid' || /is invalid/i.test(error.message || '')) {
      setRow('auth_magic', 'pass', 'Working — same as above, Supabase rejected the fake placeholder address, which confirms the endpoint itself is live. Not an SMTP issue. Try a real email address you control if you want to test actual delivery.');
    } else if (/disabled|not enabled/i.test(error.message || '')) {
      setRow('auth_magic', 'fail', 'Magic Link looks disabled. In Authentication → Providers → Email settings, make sure Magic Link is toggled on.');
      failCount++;
    } else if (/smtp|rate limit|sending/i.test(error.message || '')) {
      setRow('auth_magic', 'warn', 'Endpoint works, but sending failed: ' + error.message + '. Supabase\'s default mailer has a low rate limit (a few emails/hour) meant for testing only \u2014 if you\'re hitting this repeatedly, wait a bit and retry rather than setting up custom SMTP, unless you\'re ready for real users.');
      warnCount++;
    } else {
      setRow('auth_magic', 'warn', error.message);
      warnCount++;
    }
  } catch (e) {
    setRow('auth_magic', 'warn', String(e));
    warnCount++;
  }

  finish();

  function finish() {
    document.getElementById('run').disabled = false;
    const summary = document.getElementById('summary');
    summary.style.display = 'block';
    if (failCount === 0 && warnCount === 0) {
      summary.style.background = '#e8f7ee';
      summary.textContent = 'Everything checks out — your setup matches the sync plan.';
    } else if (failCount === 0) {
      summary.style.background = '#fff8e1';
      summary.textContent = `No failures, but ${warnCount} item(s) need a manual look — see details above.`;
    } else {
      summary.style.background = '#fdecec';
      summary.textContent = `${failCount} thing(s) need fixing before this is ready — see the red items above for exactly what and how.`;
    }
  }
});
</script>

</body>
</html>
