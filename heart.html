<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Heart Page</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            background-color: #f8f9fa;
        }

        .particle {
            position: absolute;
            /* This creates the heart shape */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            pointer-events: none;
            transition: transform 2s ease-out, opacity 2s ease-out;
        }

        #magicBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #ff6b6b; /* Changed to a "heart" color */
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }
    </style>
</head>
<body>
    <h1>Spread the Love!</h1>
    <button id="magicBtn">Click for Heart Magic!</button>

    <script>
        const btn = document.getElementById('magicBtn');
        const colorList = ['#feca57', '#ff6b6b', '#ff9ff3', '#1dd1a1', '#5f27cd'];

        btn.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            // Made them slightly larger so the heart shape is visible
            const size = Math.random() * 30 + 15;
            const randomColor = colorList[Math.floor(Math.random() * colorList.length)];

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = randomColor;

            // Offset the start position so the heart centers on the mouse click
            particle.style.left = `${x - size/2}px`;
            particle.style.top = `${y - size/2}px`;

            document.body.appendChild(particle);

            requestAnimationFrame(() => {
                const offsetX = (Math.random() - 0.5) * 300;
                const offsetY = (Math.random() - 0.5) * 300;
                // Added a random rotation so the hearts fly out at different angles
                const rotation = (Math.random() - 0.5) * 90; 
                
                particle.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${rotation}deg)`;
                particle.style.opacity = '0';
            });

            setTimeout(() => {
                particle.remove();
            }, 2000); // Reduced timeout to match the 2s transition
        }
    </script>
</body>
</html>
