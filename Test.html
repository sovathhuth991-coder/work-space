<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%,
             #fecfef 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        h1:hover {
            transform: scale(1.1) rotate(5deg);
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: all 0.2s ease;
            outline: none;
        }
        button:active {
            transform: scale(0.95);
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float 2s ease-out forwards;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }
</style>

<body>
    <h1>interactive Fun Page!</h1>
    <button id="magicBtn">Click for Magic of a century!!</button>

    <script>
        const btn = document.getElementById('magicBtn');
        const colors = ['#feca57',  '#ff6b6b', '#48dbfb', '#1dd1a1', '#5f27cd'];

        btn.addEventListener('click', (e) => {
            //Create Mutiple particles
            for (let i = 0; i < 20; i++)
            {
                createParticle(e.clientX, e.clientY);
            }
        });

        function createParticle(x, y) {
            const particles = document.createElement('div');
            particles.classList.add('particle');

            // Randomize properties
            const size = Math.random() * 20 + 5;
            const colors = colors[Math.floor(Math.random() * colors.length)];

            particles.style.width = `${size}px`;
            particles.style.height  = `${size}px`;
            particles.style.backgroundColor = colors;

            // Random position offset around the click
            const offsetX = (Math.random() - 0.5) * 100;
            const offsetY = (Math.random() - 0.5) * 100;

            particles.style.left = `${x + offsetX}px`;
            particles.style.top = `${y + offsetY}px`;

            document.body.appendChild(particles);

            // Remove particles after animation
            setTimeout(() => {
                particles.remove();
            }, 5000);
        }
    </script>
</body>
</html>
