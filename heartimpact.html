<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony of Lights</title>
    <style>
        :root {
            --bg-color: #000000;
            --staff-color: rgba(211, 105, 105, 0.05);
        }

        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: 
                linear-gradient(var(--bg-color), #1a1a2e),
                linear-gradient(var(--staff-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 25px;
            font-family: sans-serif;
            color: rgb(232, 231, 231);
            transition: background-color 0.5s ease;
        }

        /* The "Flash" Overlay */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 1;
            /* A dreamy purple/blue glow */
            background: radial-gradient(circle, rgba(95, 39, 205, 0.4) 0%, transparent 80%);
            transition: opacity 0.1s ease-out;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.5s ease-out;
        }

        .heart {
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        .note {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        #magicBtn {
            padding: 18px 40px;
            font-size: 1.3rem;
            cursor: pointer;
            background: linear-gradient(45deg, #ff4757, #5f27cd);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(95, 39, 205, 0.5);
            z-index: 10;
            transition: transform 0.1s;
        }

        #magicBtn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    
    <h1 style="letter-spacing: 3px; opacity: 0.8;">heart effect </h1>
    <button id="magicBtn">Music!!!!</button>

    <script>
        const btn = document.getElementById('magicBtn');
        const flash = document.getElementById('flash-overlay');
        const colors = ['#ff6b6b', '#ff9ff3', '#feca57', '#48dbfb', '#1dd1a1'];
        const notes = ['♪', '♫', '♬', '♩'];

        btn.addEventListener('click', (e) => {
            // 1. Trigger the Background Light-up
            flash.style.opacity = '10';
            flash.style.left = `${e.clientX - flash.offsetWidth / 2}px`;
            flash.style.top = `${e.clientY - flash.offsetHeight / 2}px`;

            createParticle(e.clientX, e.clientY, 0, 'magic'); // Create a central heart for extra impact

            // Quickly fade the flash out
            setTimeout(() => {
                flash.style.opacity = '0';
            }, 100);

            // 2. Create the Heart Shape explosion
            const numParticles = 40;
            for (let i = 0; i < numParticles; i++) {
                const t = (i / numParticles) * 2 * Math.PI;
                createParticle(e.clientX, e.clientY, t, i % 2 === 0 ? 'heart' : 'note');
            }
        });

        function createParticle(x, y, t, type) {
            const el = document.createElement('div');
            el.classList.add('particle', type);

            const size = Math.random() * 20 + 15;
            const color = colors[Math.floor(Math.random() * colors.length)];

            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            el.style.left = `${x - size/2}px`;
            el.style.top = `${y - size/2}px`;

            if (type === 'heart') {
                el.style.backgroundColor = color;
            } else {
                el.innerText = notes[Math.floor(Math.random() * notes.length)];
                el.style.color = color;
            }

            document.body.appendChild(el);

            const scale = 14; 
            const destX = 16 * Math.pow(Math.sin(t), 3) * scale;
            const destY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;

            requestAnimationFrame(() => {
                el.style.transform = `translate(${destX}px, ${destY}px) rotate(${t * 60}deg)`;
                el.style.opacity = '0';
            });

            setTimeout(() => el.remove(), 1500);
        }
    </script>
</body>
</html>
